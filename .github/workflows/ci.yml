name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: web and packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Lint
        run: pnpm lint

      - name: Typecheck and build packages
        run: pnpm -r --if-present build

  brain:
    name: brain
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/brain
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install the Brain
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then pip install -e ".[dev]"; fi

      - name: Lint
        run: |
          if command -v ruff >/dev/null 2>&1; then ruff check .; else echo "ruff not yet present, skipping"; fi

      - name: Tests
        run: |
          if [ -d tests ]; then pytest -q; else echo "no tests yet, skipping"; fi
